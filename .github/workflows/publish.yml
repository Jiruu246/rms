name: Publish

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set version
        id: meta
        run: |
            VERSION=$(date +'%Y%m%d-%H%M')-${GITHUB_SHA::7}
            echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

            REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            echo "API_IMAGE=ghcr.io/$REPO_OWNER/rms-api" >> "$GITHUB_OUTPUT"
            echo "MIGRATOR_IMAGE=ghcr.io/$REPO_OWNER/rms-database-migrator" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: |
            ${{ steps.meta.outputs.API_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.API_IMAGE }}:latest

      - name: Build & push migrator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.migrator
          push: true
          tags: |
            ${{ steps.meta.outputs.MIGRATOR_IMAGE }}:${{ steps.meta.outputs.VERSION }}
            ${{ steps.meta.outputs.MIGRATOR_IMAGE }}:latest